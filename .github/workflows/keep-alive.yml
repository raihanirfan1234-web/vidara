name: Keep Vidara Files Alive

on:
  schedule:
    # Menggunakan cron '0 0 * * 0' untuk dieksekusi seminggu sekali (Setiap hari Minggu)
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  ping-links:
    runs-on: ubuntu-latest
    steps:
      # Langkah wajib untuk mengunduh/membaca file dari repositori Anda terlebih dahulu
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Akses URL dari file links.txt
        run: |
          # Membaca file links.txt baris demi baris
          while IFS= read -r url || [ -n "$url" ]; do
            # Abaikan jika ada baris kosong atau komentar (diawali #)
            [[ -z "$url" || "$url" == \#* ]] && continue
            
            echo "Mengakses: $url"
            curl -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" -sL "$url"
            sleep 2
          done < links.txt
          
          echo "Semua file di links.txt berhasil di-ping pada $(date)"
