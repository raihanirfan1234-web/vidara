name: Freedl Keep Alive & Auto Clean (Parallel)

on:
  schedule:
    # Berjalan otomatis seminggu sekali (Setiap hari Minggu jam 07:00 WIB)
    - cron: '0 0 * * 0'
  workflow_dispatch: # Tombol untuk tes jalankan manual kapan saja

jobs:
  ping-links:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        chunk: [1, 2] # Membagi proses menjadi 2 bagian paralel

    steps:
      # Menggunakan tag versi umum utama atau versi rilis paling stabil yang kompatibel dengan runtime baru
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          set-safe-directory: 'true'

      # Menggunakan tag versi umum utama untuk mendeteksi runtime Node terbaru dari runner
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      # Menginstal dependensi yang dibutuhkan skrip Python
      - name: Install dependencies
        run: pip install requests

      - name: Run keep alive script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python keep_alive.py ${{ matrix.chunk }} 2

      # Solusi tuntas untuk mencegah error 128 (unstaged changes)
      - name: Commit and Push if links.txt changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 1. Cek apakah ada perubahan di file links.txt
          if ! git diff --quiet links.txt; then
            echo "Menemukan link mati, mengunci komit lokal..."
            
            # 2. Amankan perubahan ke dalam komit lokal terlebih dahulu
            git add links.txt
            git commit -m "🧹 Auto-clean dead links (Chunk ${{ matrix.chunk }})"
            
            # 3. Sinkronkan repositori dengan rebase agar aman dari tabrakan antar proses paralel
            git pull --rebase origin main
            
            # 4. Dorong kembali perubahan ke GitHub utama
            git push origin main
          else
            echo "Tidak ada link mati di chunk ini. links.txt aman."
          fi
